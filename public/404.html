<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirigiendo...</title>
    <script>
      (function () {
        var parts = window.location.pathname.split("/").filter(Boolean);
        var projectRoot = parts.length > 0 ? "/" + parts[0] + "/" : "/";
        window.location.replace(projectRoot + window.location.search + window.location.hash);
      })();
    </script>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top right, rgba(157, 187, 69, 0.12), transparent 28rem),
          linear-gradient(180deg, #ffffff 0%, #f5f7f7 100%);
        color: #1f2a2c;
        font-family: Manrope, Arial, sans-serif;
      }

      a {
        color: #24383b;
      }
    </style>
  </head>
  <body>
    <p>Redirigiendo a Dentatus. Si no ocurre automáticamente, <a id="home-link" href="/">haz clic aquí</a>.</p>
    <script>
      (function () {
        var parts = window.location.pathname.split("/").filter(Boolean);
        var projectRoot = parts.length > 0 ? "/" + parts[0] + "/" : "/";
        var homeLink = document.getElementById("home-link");
        if (homeLink) {
          homeLink.setAttribute("href", projectRoot);
        }
      })();
    </script>
  </body>
</html>
